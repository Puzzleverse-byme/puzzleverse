<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Flip – PuzzleVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070F;
    --surface: #10101E;
    --card: #16162A;
    --border: #2A2A4A;
    --purple: #7C3AED;
    --purple-glow: #9D5BF5;
    --cyan: #00E5FF;
    --yellow: #FFD600;
    --green: #00E676;
    --pink: #FF4081;
    --text: #E8E8FF;
    --muted: #6868A0;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px;
    background: rgba(7,7,15,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900; font-size: 1.2rem;
    color: var(--cyan); letter-spacing: 2px;
    text-shadow: 0 0 20px var(--cyan);
    text-decoration: none;
  }
  .nav-logo span { color: var(--purple-glow); }
  .nav-back {
    background: rgba(124,58,237,0.15);
    border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 8px 18px; font-size: 0.85rem;
    cursor: pointer; transition: background 0.2s;
  }
  .nav-back:hover { background: rgba(124,58,237,0.3); }

  /* MAIN LAYOUT */
  .game-wrapper {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 110px 24px 60px;
  }

  /* HEADER */
  .game-header { text-align: center; margin-bottom: 36px; }
  .game-label {
    font-size: 0.75rem; font-weight: 700;
    color: var(--purple-glow); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900; margin-bottom: 8px;
  }
  .game-subtitle { color: var(--muted); font-size: 0.95rem; }

  /* DIFFICULTY SELECTOR */
  .diff-row {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 28px; flex-wrap: wrap;
  }
  .diff-btn {
    padding: 8px 22px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .diff-btn:hover { border-color: var(--purple); color: var(--text); }
  .diff-btn.active {
    background: var(--purple); border-color: var(--purple);
    color: #fff; box-shadow: 0 0 16px rgba(124,58,237,0.5);
  }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 16px; justify-content: center;
    margin-bottom: 28px; flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 24px;
    text-align: center; min-width: 100px;
  }
  .stat-chip-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--cyan);
  }
  .stat-chip-label {
    font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-top: 2px;
  }

  /* CARD GRID */
  #card-grid {
    display: grid;
    gap: 12px;
    margin: 0 auto;
    justify-items: center;
  }

  /* INDIVIDUAL CARD */
  .mem-card {
    width: 100%; aspect-ratio: 1;
    cursor: pointer;
    perspective: 800px;
    position: relative;
  }
  .mem-card-inner {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    border-radius: 14px;
  }
  .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
  .mem-card.matched .mem-card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  /* BACK face */
  .card-back {
    background: linear-gradient(135deg, #16162A, #1e1e3a);
    font-size: 1.6rem;
    color: var(--purple-glow);
    font-family: 'Orbitron', sans-serif;
  }
  .card-back::after {
    content: '?';
    font-size: 1.4rem;
    color: var(--purple-glow);
    opacity: 0.6;
  }
  .mem-card:hover:not(.matched) .card-back {
    border-color: var(--purple);
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }

  /* FRONT face */
  .card-front {
    background: linear-gradient(135deg, #1a0a3a, #2e1065);
    transform: rotateY(180deg);
    font-size: 2.2rem;
    flex-direction: column; gap: 4px;
    border-color: var(--purple);
  }
  .card-front .card-emoji { font-size: 2rem; line-height: 1; }

  .mem-card.matched .card-front {
    background: linear-gradient(135deg, #0a2a1a, #064e3b);
    border-color: var(--green);
    box-shadow: 0 0 24px rgba(0,230,118,0.3);
    animation: matchPop 0.35s ease;
  }
  @keyframes matchPop {
    0%  { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.12); }
    100%{ transform: rotateY(180deg) scale(1); }
  }

  /* WIN SCREEN */
  #win-screen {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(7,7,15,0.92);
    backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 24px;
  }
  #win-screen.show { display: flex; }
  .win-emoji { font-size: 4rem; margin-bottom: 16px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { to { transform: translateY(-12px); } }
  .win-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 900; color: var(--green);
    text-shadow: 0 0 32px var(--green);
    margin-bottom: 8px;
  }
  .win-sub { color: var(--muted); font-size: 1rem; margin-bottom: 28px; }
  .win-stats {
    display: flex; gap: 24px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .win-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 28px; text-align: center;
  }
  .win-stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem; font-weight: 700; color: var(--cyan);
  }
  .win-stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .win-star { color: var(--yellow); font-size: 1.8rem; margin-bottom: 20px; }
  .win-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-primary {
    background: linear-gradient(135deg, var(--purple), #5B21B6);
    color: #fff; border: none; border-radius: 10px;
    padding: 14px 32px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: box-shadow 0.2s, transform 0.2s;
  }
  .btn-primary:hover { box-shadow: 0 0 28px var(--purple); transform: translateY(-2px); }
  .btn-outline {
    background: transparent; color: var(--cyan);
    border: 1.5px solid var(--cyan); border-radius: 10px;
    padding: 14px 32px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-outline:hover { background: rgba(0,229,255,0.08); }

  /* BEST SCORE BANNER */
  #best-banner {
    display: none;
    background: linear-gradient(135deg, rgba(255,214,0,0.1), rgba(255,214,0,0.05));
    border: 1px solid rgba(255,214,0,0.3);
    border-radius: 10px; padding: 10px 20px;
    text-align: center; font-size: 0.85rem;
    color: var(--yellow); margin-bottom: 16px;
  }
  #best-banner.show { display: block; }

  /* TIMER BAR */
  .timer-wrap { margin-bottom: 20px; }
  .timer-bar-bg {
    height: 4px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 99px;
    transition: width 1s linear, background 0.5s;
  }
  .timer-bar-fill.urgent { background: linear-gradient(90deg, var(--pink), #ff1744); }

  @media (max-width: 600px) {
    nav { padding: 14px 16px; }
    .game-wrapper { padding: 90px 12px 40px; }
    #card-grid { gap: 8px; }
    .card-front { font-size: 1.6rem; }
  }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2750548018774327" crossorigin="anonymous"></script>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Puzzle<span>Verse</span></a>
  <button class="nav-back" onclick="window.location.href='puzzle-games.html'">← Back to Games</button>
</nav>

<div class="game-wrapper">
  <div class="game-header">
    <div class="game-label">Memory Game</div>
    <h1 class="game-title">🃏 Flip & Match</h1>
    <p class="game-subtitle">Find all matching pairs before time runs out!</p>
  </div>

  <!-- DIFFICULTY -->
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">😊 Easy (4×3)</button>
    <button class="diff-btn" onclick="setDiff('medium',this)">🔥 Medium (4×4)</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">💀 Hard (6×4)</button>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-chip">
      <div class="stat-chip-val" id="stat-moves">0</div>
      <div class="stat-chip-label">Moves</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="stat-time">60</div>
      <div class="stat-chip-label">Seconds</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="stat-pairs">0</div>
      <div class="stat-chip-label">Pairs Found</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="stat-best">--</div>
      <div class="stat-chip-label">Best Score</div>
    </div>
  </div>

  <!-- TIMER BAR -->
  <div class="timer-wrap">
    <div class="timer-bar-bg">
      <div class="timer-bar-fill" id="timer-fill"></div>
    </div>
  </div>

  <div id="best-banner">🏆 New Best Score!</div>

  <!-- CARD GRID -->
  <div id="card-grid"></div>

  <!-- SOUND TOGGLE -->
  <div style="text-align:center;margin-top:28px;display:flex;gap:12px;justify-content:center;align-items:center;">
    <button class="btn-primary" id="start-btn" onclick="startGame()">▶ Start Game</button>
    <button id="mute-btn" onclick="toggleMute()" style="
      background:rgba(124,58,237,0.15); border:1px solid #2A2A4A;
      color:#E8E8FF; border-radius:10px; padding:14px 18px;
      font-size:1.1rem; cursor:pointer; transition:background 0.2s;
    " title="Toggle Sound">🔊</button>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <div class="win-title">You Won!</div>
  <p class="win-sub">All pairs matched!</p>
  <div class="win-star" id="win-stars">⭐⭐⭐</div>
  <div class="win-stats">
    <div class="win-stat">
      <div class="win-stat-val" id="ws-moves">0</div>
      <div class="win-stat-label">Moves</div>
    </div>
    <div class="win-stat">
      <div class="win-stat-val" id="ws-time">0s</div>
      <div class="win-stat-label">Time Left</div>
    </div>
    <div class="win-stat">
      <div class="win-stat-val" id="ws-score">0</div>
      <div class="win-stat-label">Score</div>
    </div>
  </div>
  <div class="win-btns">
    <button class="btn-primary" onclick="startGame()">🔄 Play Again</button>
    <button class="btn-outline" onclick="document.getElementById('win-screen').classList.remove('show')">📊 See Board</button>
  </div>
</div>

<script>
const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐙','🦋','🌸','🍕','🎸','🚀','⚡','🌈','🔥','💎','🎯'];

const DIFFS = {
  easy:   { cols: 4, rows: 3, pairs: 6,  time: 60  },
  medium: { cols: 4, rows: 4, pairs: 8,  time: 90  },
  hard:   { cols: 6, rows: 4, pairs: 12, time: 120 }
};

let diff = 'easy';
let cards = [], flipped = [], matched = 0, moves = 0;
let timer = null, timeLeft = 0, totalTime = 0;
let gameActive = false;
let bestScores = { easy: null, medium: null, hard: null };

/* ── AUDIO ENGINE (Web Audio API) ── */
let audioCtx = null;
let muted = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration);
  } catch(e) {}
}

function sfxFlip() {
  playTone(520, 'sine', 0.08, 0.2);
}

function sfxMatch() {
  // Happy ascending chord
  playTone(523, 'sine', 0.15, 0.25, 0);
  playTone(659, 'sine', 0.15, 0.25, 0.08);
  playTone(784, 'sine', 0.2,  0.25, 0.16);
}

function sfxNoMatch() {
  // Low descending thud
  playTone(220, 'sawtooth', 0.12, 0.15, 0);
  playTone(180, 'sawtooth', 0.12, 0.1, 0.08);
}

function sfxWin() {
  // Victory fanfare
  const notes = [523,659,784,1047];
  notes.forEach((f, i) => playTone(f, 'sine', 0.25, 0.3, i * 0.12));
  setTimeout(() => {
    const notes2 = [1047,1175,1319];
    notes2.forEach((f, i) => playTone(f, 'triangle', 0.3, 0.35, i * 0.1));
  }, 600);
}

function sfxLose() {
  // Sad descending
  [440,370,311,261].forEach((f, i) => playTone(f, 'sawtooth', 0.2, 0.2, i * 0.15));
}

function sfxStart() {
  [330,440,550].forEach((f, i) => playTone(f, 'sine', 0.1, 0.2, i * 0.07));
}

function sfxUrgent() {
  playTone(880, 'square', 0.06, 0.1);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

/* ── GAME LOGIC ── */
function setDiff(d, btn) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetBoard();
}

function resetBoard() {
  clearInterval(timer);
  gameActive = false;
  flipped = []; matched = 0; moves = 0;
  updateStats();
  document.getElementById('best-banner').classList.remove('show');
  document.getElementById('start-btn').style.display = 'inline-block';
  const cfg = DIFFS[diff];
  timeLeft = cfg.time; totalTime = cfg.time;
  updateTimerBar();
  document.getElementById('stat-time').textContent = timeLeft;
  renderGrid(false);
}

function startGame() {
  sfxStart();
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('win-screen').classList.remove('show');
  // reset win screen state
  document.querySelector('.win-emoji').textContent = '🎉';
  document.querySelector('.win-title').textContent = 'You Won!';
  document.querySelector('.win-sub').textContent = 'All pairs matched!';
  resetBoard();
  gameActive = true;
  const cfg = DIFFS[diff];
  timeLeft = cfg.time; totalTime = cfg.time;
  updateTimerBar();
  renderGrid(true);
  clearInterval(timer);
  timer = setInterval(tick, 1000);
}

let lastUrgent = false;
function tick() {
  if (!gameActive) return;
  timeLeft--;
  document.getElementById('stat-time').textContent = timeLeft;
  updateTimerBar();
  const isUrgent = (timeLeft / totalTime) < 0.25;
  if (isUrgent && timeLeft % 3 === 0) sfxUrgent();
  if (timeLeft <= 0) {
    clearInterval(timer);
    gameActive = false;
    showLose();
  }
}

function updateTimerBar() {
  const pct = totalTime > 0 ? (timeLeft / totalTime) * 100 : 0;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('urgent', pct < 25);
}

function renderGrid(active) {
  const cfg = DIFFS[diff];
  const grid = document.getElementById('card-grid');
  grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  grid.style.maxWidth = cfg.cols <= 4 ? '520px' : '720px';

  const pool = EMOJIS.slice(0, cfg.pairs);
  const deck = [...pool, ...pool].sort(() => Math.random() - 0.5);
  cards = deck;

  grid.innerHTML = '';
  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'mem-card' + (!active ? ' locked' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="mem-card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front"><div class="card-emoji">${emoji}</div></div>
      </div>`;
    if (active) card.addEventListener('click', () => flipCard(i, card));
    grid.appendChild(card);
  });
}

function flipCard(idx, el) {
  if (!gameActive) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  sfxFlip();
  el.classList.add('flipped');
  flipped.push({ idx, el, emoji: cards[idx] });

  if (flipped.length === 2) {
    moves++;
    updateStats();
    const [a, b] = flipped;
    if (a.emoji === b.emoji) {
      sfxMatch();
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flipped = [];
        matched++;
        updateStats();
        if (matched === DIFFS[diff].pairs) {
          clearInterval(timer);
          gameActive = false;
          setTimeout(showWin, 500);
        }
      }, 300);
    } else {
      sfxNoMatch();
      setTimeout(() => {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flipped = [];
      }, 900);
    }
  }
}

function updateStats() {
  document.getElementById('stat-moves').textContent = moves;
  document.getElementById('stat-pairs').textContent = matched;
  const best = bestScores[diff];
  document.getElementById('stat-best').textContent = best !== null ? best : '--';
}

function calcScore() {
  return Math.max(0, timeLeft * 20 + DIFFS[diff].pairs * 100 - moves * 5);
}

function calcStars(score, maxScore) {
  const pct = score / maxScore;
  if (pct >= 0.75) return '⭐⭐⭐';
  if (pct >= 0.45) return '⭐⭐';
  return '⭐';
}

function showWin() {
  sfxWin();
  const score = calcScore();
  const maxScore = DIFFS[diff].time * 20 + DIFFS[diff].pairs * 100;
  const stars = calcStars(score, maxScore);
  const isNew = bestScores[diff] === null || score > bestScores[diff];
  if (isNew) {
    bestScores[diff] = score;
    document.getElementById('best-banner').classList.add('show');
  }
  updateStats();
  document.getElementById('ws-moves').textContent = moves;
  document.getElementById('ws-time').textContent = timeLeft + 's';
  document.getElementById('ws-score').textContent = score;
  document.getElementById('win-stars').textContent = stars;
  document.getElementById('win-screen').classList.add('show');
}

function showLose() {
  sfxLose();
  document.getElementById('win-screen').classList.add('show');
  document.querySelector('.win-emoji').textContent = '⏰';
  document.querySelector('.win-title').textContent = "Time's Up!";
  document.querySelector('.win-sub').textContent = `You found ${matched} of ${DIFFS[diff].pairs} pairs.`;
  document.getElementById('win-stars').textContent = '💀';
  document.getElementById('ws-moves').textContent = moves;
  document.getElementById('ws-time').textContent = '0s';
  document.getElementById('ws-score').textContent = calcScore();
}

// init
resetBoard();
</script>
</body>
</html>
