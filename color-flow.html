<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Color Flow – PuzzleVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070F;--surface:#10101E;--card:#16162A;--border:#2A2A4A;--purple:#7C3AED;--pg:#9D5BF5;--cyan:#00E5FF;--yellow:#FFD600;--green:#00E676;--pink:#FF4081;--text:#E8E8FF;--muted:#6868A0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(7,7,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1rem;color:var(--cyan);letter-spacing:2px;text-decoration:none}
.nav-logo span{color:var(--pg)}
.nav-back{background:rgba(124,58,237,0.15);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 16px;font-size:0.82rem;cursor:pointer}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:100px 16px 60px;text-align:center}
.game-label{font-size:0.72rem;font-weight:700;color:var(--pg);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.game-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,6vw,2.4rem);font-weight:900;margin-bottom:6px}
.game-sub{color:var(--muted);font-size:0.88rem;margin-bottom:20px}
.stats-bar{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;min-width:80px}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.diff-btn{padding:7px 18px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer}
.diff-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
#grid-wrap{display:inline-block;margin-bottom:16px}
#cf-grid{display:grid;gap:4px;background:var(--border);border:3px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(124,58,237,0.2)}
.cf-cell{width:52px;height:52px;background:var(--card);cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:background 0.1s}
.cf-cell.dot::after{content:'';width:60%;height:60%;border-radius:50%;background:inherit;filter:brightness(1.4);position:absolute}
.cf-cell.filled{opacity:0.85}
#msg{font-family:'Orbitron',sans-serif;font-size:0.9rem;color:var(--muted);margin-bottom:14px;min-height:24px}
.btn-primary{background:linear-gradient(135deg,var(--purple),#5B21B6);color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin:6px}
.btn-outline{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:10px;padding:13px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin:6px}
#win-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,7,15,0.93);backdrop-filter:blur(10px);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
#win-screen.show{display:flex}
.win-emoji{font-size:3.5rem;margin-bottom:14px;animation:bounce 0.6s ease infinite alternate}
@keyframes bounce{to{transform:translateY(-10px)}}
.win-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--green);text-shadow:0 0 28px var(--green);margin-bottom:8px}
.win-sub{color:var(--muted);margin-bottom:20px}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2750548018774327" crossorigin="anonymous"></script>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Puzzle<span>Verse</span></a>
  <button class="nav-back" onclick="window.location.href='index.html'">← Back</button>
</nav>
<div class="wrap">
  <div class="game-label">Spatial Game</div>
  <h1 class="game-title">🔵 Color Flow</h1>
  <p class="game-sub">Connect matching dots — fill the entire board!</p>
  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">😊 Easy (5×5)</button>
    <button class="diff-btn" onclick="setDiff('medium',this)">🔥 Medium (6×6)</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">💀 Hard (7×7)</button>
  </div>
  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-val" id="s-moves">0</div><div class="stat-lbl">Moves</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-filled">0%</div><div class="stat-lbl">Filled</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-level">1</div><div class="stat-lbl">Level</div></div>
  </div>
  <div id="grid-wrap"><div id="cf-grid"></div></div>
  <div id="msg">Tap a dot, then tap path to connect!</div>
  <div>
    <button class="btn-primary" onclick="loadLevel()">🔀 New Level</button>
    <button class="btn-outline" onclick="clearPaths()">🗑️ Clear</button>
  </div>
</div>
<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <div class="win-title">Board Filled!</div>
  <p class="win-sub" id="win-sub">All paths connected!</p>
  <button class="btn-primary" onclick="loadLevel()">Next Level →</button>
  <button class="btn-outline" onclick="document.getElementById('win-screen').classList.remove('show')">View Board</button>
</div>
<script>
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTone(f,t,d,v=0.2){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}
function sfxPlace(){playTone(440,'sine',0.06,0.15)}
function sfxConnect(){playTone(659,'sine',0.12,0.25);playTone(784,'sine',0.12,0.2,0.1)}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.3),i*120))}

const COLORS=['#FF4081','#00E5FF','#FFD600','#00E676','#FF6D00','#AA00FF'];
const PUZZLES={
  easy:[
    {size:5,dots:[[0,0,0],[0,4,0],[4,0,1],[4,4,1],[2,0,2],[2,4,2]]},
    {size:5,dots:[[0,0,0],[3,3,0],[0,4,1],[4,1,1],[1,1,2],[3,4,2]]},
    {size:5,dots:[[0,2,0],[4,2,0],[2,0,1],[2,4,1],[0,0,2],[4,4,2]]},
  ],
  medium:[
    {size:6,dots:[[0,0,0],[5,5,0],[0,5,1],[5,0,1],[2,1,2],[3,4,2],[1,3,3],[4,2,3]]},
    {size:6,dots:[[0,0,0],[0,5,0],[5,0,1],[5,5,1],[2,2,2],[3,3,2],[1,4,3],[4,1,3]]},
  ],
  hard:[
    {size:7,dots:[[0,0,0],[6,6,0],[0,6,1],[6,0,1],[3,0,2],[3,6,2],[0,3,3],[6,3,3],[2,2,4],[4,4,4]]},
  ]
};

let diff='easy',grid=[],size=5,dots=[],paths={},activePath=null,activeColor=-1,moves=0,level=0;

function setDiff(d,btn){diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');level=0;loadLevel()}

function loadLevel(){
  const pool=PUZZLES[diff];
  const puzzle=pool[level%pool.length];
  size=puzzle.size;dots=puzzle.dots;
  grid=Array.from({length:size},()=>Array(size).fill(-1));
  paths={};moves=0;activePath=null;activeColor=-1;
  dots.forEach(([r,c,col])=>{grid[r][c]=col});
  document.getElementById('s-moves').textContent=0;
  document.getElementById('s-filled').textContent='0%';
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('msg').textContent='Tap a dot to start drawing!';
  renderGrid();
}

function clearPaths(){
  grid=Array.from({length:size},()=>Array(size).fill(-1));
  dots.forEach(([r,c,col])=>{grid[r][c]=col});
  paths={};activePath=null;activeColor=-1;moves=0;
  document.getElementById('s-moves').textContent=0;
  document.getElementById('s-filled').textContent='0%';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('cf-grid');
  const cellSize=Math.min(52,Math.floor((window.innerWidth-64)/size));
  g.style.gridTemplateColumns=`repeat(${size},${cellSize}px)`;
  g.innerHTML='';
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const cell=document.createElement('div');
      cell.className='cf-cell';
      cell.style.width=cellSize+'px';cell.style.height=cellSize+'px';
      const col=grid[r][c];
      if(col>=0){cell.style.background=COLORS[col];cell.classList.add('filled')}
      const isDot=dots.some(([dr,dc,dc2])=>dr===r&&dc===c);
      if(isDot)cell.classList.add('dot');
      cell.addEventListener('click',()=>cellClick(r,c));
      cell.addEventListener('touchstart',e=>{e.preventDefault();cellClick(r,c)},{passive:false});
      g.appendChild(cell);
    }
  }
  // update filled %
  let filled=0;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(grid[r][c]>=0)filled++;
  document.getElementById('s-filled').textContent=Math.round(filled/size/size*100)+'%';
}

function cellClick(r,c){
  const col=grid[r][c];
  const isDot=dots.some(([dr,dc])=>dr===r&&dc===c);
  if(activePath===null){
    if(col<0)return;
    activePath=[{r,c}];activeColor=col;
    document.getElementById('msg').textContent=`Drawing with color ${activeColor+1}...`;
    sfxPlace();return;
  }
  // continue path
  const last=activePath[activePath.length-1];
  const dr=Math.abs(r-last.r),dc=Math.abs(c-last.c);
  if((dr===1&&dc===0)||(dr===0&&dc===1)){
    if(col>=0&&col!==activeColor&&!isDot){document.getElementById('msg').textContent='❌ Blocked!';return;}
    // clear old path of this color from grid
    activePath.forEach(p=>{if(!dots.some(([dr,dc])=>dr===p.r&&dc===p.c))grid[p.r][p.c]=-1});
    activePath.push({r,c});
    activePath.forEach(p=>{grid[p.r][p.c]=activeColor});
    moves++;document.getElementById('s-moves').textContent=moves;
    sfxPlace();
    // check if connected to matching dot
    if(isDot&&col===activeColor&&activePath.length>1){
      sfxConnect();
      document.getElementById('msg').textContent='✅ Connected!';
      activePath=null;activeColor=-1;
      renderGrid();
      checkWin();return;
    }
    renderGrid();
  } else if(isDot&&col===activeColor){
    activePath=null;activeColor=-1;
    document.getElementById('msg').textContent='Tap a dot to start!';
  }
}

function checkWin(){
  // all cells filled and all colors connected
  let allFilled=true;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(grid[r][c]<0){allFilled=false;break;}
  if(allFilled){sfxWin();level++;document.getElementById('s-level').textContent=level;setTimeout(()=>{document.getElementById('win-sub').textContent=`${moves} moves! Level ${level} unlocked!`;document.getElementById('win-screen').classList.add('show');},400);}
}

loadLevel();
</script>
</body>
</html>
