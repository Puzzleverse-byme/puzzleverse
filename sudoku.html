// Track used puzzles per difficulty
let usedPuzzles={easy:[],medium:[],hard:[]};
let diff='easy',board=[],solution=[],given=[],selected=-1,errors=0,hints=3,timerInt=null,seconds=0,gameOn=false;

function setDiff(d,btn){diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');newGame()}

function getRandomPuzzle(d){
  const pool=PUZZLES[d];
  // Reset if all used
  if(usedPuzzles[d].length>=pool.length)usedPuzzles[d]=[];
  // Pick unused
  const available=pool.map((_,i)=>i).filter(i=>!usedPuzzles[d].includes(i));
  const idx=available[Math.floor(Math.random()*available.length)];
  usedPuzzles[d].push(idx);
  return pool[idx];
}

function solve(b){
  const board=[...b];
  function possible(b,i,n){
    const r=Math.floor(i/9),c=i%9;
    for(let j=0;j<9;j++){if(b[r*9+j]===n||b[j*9+c]===n)return false;}
    const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
    for(let x=0;x<3;x++)for(let y=0;y<3;y++)if(b[(br+x)*9+(bc+y)]===n)return false;
    return true;
  }
  function go(b){
    const i=b.indexOf(0);if(i<0)return true;
    for(let n=1;n<=9;n++){if(possible(b,i,n)){b[i]=n;if(go(b))return true;b[i]=0;}}
    return false;
  }
  go(board);return board;
}

function newGame(){
  clearInterval(timerInt);seconds=0;errors=0;hints=3;selected=-1;gameOn=true;
  document.getElementById('s-errors').textContent=0;
  document.getElementById('s-hints').textContent=3;
  document.getElementById('s-time').textContent='0:00';
  document.getElementById('msg').textContent='';
  document.getElementById('win-screen').classList.remove('show');
  const template=getRandomPuzzle(diff);
  board=[...template];
  solution=solve([...template]);
  given=board.map(v=>v!==0);
  renderGrid();buildNumpad();
  timerInt=setInterval(()=>{seconds++;const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('s-time').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);
}

    c.className='cell'+(given[i]?' given':'')+(i===selected?' selected':'');
    const row=Math.floor(i/9),col=i%9;
    if(col===2||col===5)c.classList.add('box-right');
    if(row===2||row===5)c.classList.add('box-bottom');
    if(!given[i]&&v!==0){c.classList.add(v===solution[i]?'correct':'error')}
    if(selected>=0&&!given[i]){
      const sr=Math.floor(selected/9),sc=selected%9;
      if(Math.floor(i/9)===sr||i%9===sc||(Math.floor(row/3)===Math.floor(sr/3)&&Math.floor(col/3)===Math.floor(sc/3)))c.classList.add('highlight');
    }
    c.textContent=v||'';
    c.addEventListener('click',()=>selectCell(i));
    g.appendChild(c);
  });
}

function buildNumpad(){
  const np=document.getElementById('numpad');np.innerHTML='';
  for(let n=1;n<=9;n++){const b=document.createElement('button');b.className='num-btn';b.textContent=n;b.addEventListener('click',()=>enterNum(n));np.appendChild(b);}
  const e=document.createElement('button');e.className='num-btn erase';e.textContent='⌫';e.addEventListener('click',()=>enterNum(0));np.appendChild(e);
}

function selectCell(i){if(given[i])return;sfxTap();selected=i;renderGrid()}

function enterNum(n){
  if(selected<0||given[selected]||!gameOn)return;
  board[selected]=n;
  if(n!==0&&n!==solution[selected]){errors++;document.getElementById('s-errors').textContent=errors;sfxError();document.getElementById('msg').textContent='❌ Wrong number!';setTimeout(()=>document.getElementById('msg').textContent='',1500);}
  else if(n!==0){sfxCorrect();document.getElementById('msg').textContent='✅ Correct!';setTimeout(()=>document.getElementById('msg').textContent='',1000);}
  renderGrid();
  if(board.join('')===solution.join('')){clearInterval(timerInt);gameOn=false;sfxWin();setTimeout(()=>{document.getElementById('win-sub').textContent=`Time: ${document.getElementById('s-time').textContent} | Errors: ${errors}`;document.getElementById('win-screen').classList.add('show');},500);}
}

function useHint(){
  if(hints<=0||selected<0||given[selected]||!gameOn)return;
  board[selected]=solution[selected];hints--;
  document.getElementById('s-hints').textContent=hints;
  sfxCorrect();renderGrid();
}

function checkBoard(){
  let wrong=0;
  board.forEach((v,i)=>{if(!given[i]&&v!==0&&v!==solution[i])wrong++;});
  const msg=document.getElementById('msg');
  if(wrong===0)msg.textContent='✅ No mistakes found!';
  else msg.textContent=`❌ ${wrong} mistake(s) found!`;
  setTimeout(()=>msg.textContent='',2500);
}

newGame();
</script>
