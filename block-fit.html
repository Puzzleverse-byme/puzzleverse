<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Block Fit – PuzzleVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070F;--surface:#10101E;--card:#16162A;--border:#2A2A4A;--purple:#7C3AED;--pg:#9D5BF5;--cyan:#00E5FF;--yellow:#FFD600;--green:#00E676;--pink:#FF4081;--text:#E8E8FF;--muted:#6868A0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(7,7,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1rem;color:var(--cyan);letter-spacing:2px;text-decoration:none}
.nav-logo span{color:var(--pg)}
.nav-back{background:rgba(124,58,237,0.15);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 16px;font-size:0.82rem;cursor:pointer}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:100px 16px 60px;text-align:center}
.game-label{font-size:0.72rem;font-weight:700;color:var(--pg);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.game-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,6vw,2.4rem);font-weight:900;margin-bottom:6px}
.game-sub{color:var(--muted);font-size:0.88rem;margin-bottom:20px}
.stats-bar{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;min-width:80px}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
#bf-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;background:var(--border);border:3px solid var(--border);border-radius:12px;overflow:hidden;max-width:360px;margin:0 auto 16px;box-shadow:0 0 40px rgba(124,58,237,0.2)}
.bf-cell{aspect-ratio:1;background:var(--card);transition:background 0.1s}
.bf-cell.filled{opacity:0.9}
.bf-cell.preview{opacity:0.5}
#pieces-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.piece-wrap{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:border-color 0.2s}
.piece-wrap.selected{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,229,255,0.3)}
.piece-grid{display:grid;gap:2px}
.piece-cell{width:16px;height:16px;border-radius:3px}
#msg{font-size:0.85rem;color:var(--muted);margin-bottom:12px;min-height:20px}
.btn-primary{background:linear-gradient(135deg,var(--purple),#5B21B6);color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin:6px}
.btn-outline{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:10px;padding:13px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin:6px}
#win-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,7,15,0.93);backdrop-filter:blur(10px);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
#win-screen.show{display:flex}
.win-emoji{font-size:3.5rem;margin-bottom:14px;animation:bounce 0.6s ease infinite alternate}
@keyframes bounce{to{transform:translateY(-10px)}}
.win-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--yellow);text-shadow:0 0 28px var(--yellow);margin-bottom:8px}
.win-sub{color:var(--muted);margin-bottom:20px}
.win-score{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--cyan);margin:12px 0}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2750548018774327" crossorigin="anonymous"></script>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Puzzle<span>Verse</span></a>
  <button class="nav-back" onclick="window.location.href='index.html'">← Back</button>
</nav>
<div class="wrap">
  <div class="game-label">Spatial Game</div>
  <h1 class="game-title">🎯 Block Fit</h1>
  <p class="game-sub">Place all blocks on the board. Clear lines to score!</p>
  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-val" id="s-score">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-lines">0</div><div class="stat-lbl">Lines</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-best">--</div><div class="stat-lbl">Best</div></div>
  </div>
  <div id="bf-grid"></div>
  <div id="pieces-row"></div>
  <div id="msg">Select a piece, then tap the board to place it!</div>
  <button class="btn-primary" onclick="newGame()">🔀 New Game</button>
</div>
<div id="win-screen">
  <div class="win-emoji">💥</div>
  <div class="win-title">Game Over!</div>
  <p class="win-sub">No more moves!</p>
  <div class="win-score" id="ws-score">0</div>
  <p class="win-sub" id="ws-best"></p>
  <button class="btn-primary" onclick="newGame()">🔄 Play Again</button>
</div>
<script>
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTone(f,t,d,v=0.2){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}
function sfxPlace(){playTone(440,'sine',0.08,0.2)}
function sfxLine(){playTone(659,'sine',0.15,0.3);playTone(784,'sine',0.15,0.3,0.1)}
function sfxOver(){[300,250,200].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.15,0.2),i*120))}

const COLS=['#FF4081','#00E5FF','#FFD600','#00E676','#FF6D00','#AA00FF','#FF1744','#00BCD4'];
const SHAPES=[
  [[1,1],[1,1]],          // 2x2
  [[1,1,1]],              // 3x1 H
  [[1],[1],[1]],          // 1x3 V
  [[1,1,1,1]],            // 4x1 H
  [[1],[1],[1],[1]],      // 1x4 V
  [[1,1],[1,0]],          // L
  [[1,0],[1,1]],          // J
  [[0,1],[1,1]],          // S
  [[1,1],[0,1]],          // Z
  [[1,1,1],[0,1,0]],      // T
  [[1,0],[1,0],[1,1]],    // L tall
  [[0,1],[0,1],[1,1]],    // J tall
  [[1]],                  // 1x1
  [[1,1,1],[1,0,0]],      // corner
  [[1,1,1],[0,0,1]],      // corner2
];

const ROWS=8,COLS_N=8;
let board,score,lines,best=null,pieces,selectedPiece;

function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS_N).fill(null));
  score=0;lines=0;selectedPiece=null;
  document.getElementById('s-score').textContent=0;
  document.getElementById('s-lines').textContent=0;
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('msg').textContent='Select a piece below!';
  spawnPieces();renderBoard();
}

function spawnPieces(){
  pieces=Array.from({length:3},()=>{
    const shape=SHAPES[Math.floor(Math.random()*SHAPES.length)];
    const color=COLS[Math.floor(Math.random()*COLS.length)];
    return{shape,color,placed:false};
  });
  renderPieces();
}

function renderPieces(){
  const row=document.getElementById('pieces-row');row.innerHTML='';
  pieces.forEach((p,i)=>{
    if(p.placed)return;
    const wrap=document.createElement('div');
    wrap.className='piece-wrap'+(selectedPiece===i?' selected':'');
    const g=document.createElement('div');
    g.className='piece-grid';
    g.style.gridTemplateColumns=`repeat(${p.shape[0].length},16px)`;
    p.shape.forEach(row2=>{row2.forEach(cell=>{const c=document.createElement('div');c.className='piece-cell';c.style.background=cell?p.color:'transparent';g.appendChild(c);})});
    wrap.appendChild(g);
    wrap.addEventListener('click',()=>{selectedPiece=i;renderPieces();document.getElementById('msg').textContent='Now tap the board to place it!';});
    row.appendChild(wrap);
  });
}

function renderBoard(previewR=-1,previewC=-1){
  const g=document.getElementById('bf-grid');g.innerHTML='';
  const preview=new Set();
  if(selectedPiece!==null&&previewR>=0){
    const p=pieces[selectedPiece];
    p.shape.forEach((row2,dr)=>row2.forEach((cell,dc)=>{if(cell)preview.add(`${previewR+dr},${previewC+dc}`)}));
  }
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS_N;c++){
      const cell=document.createElement('div');
      cell.className='bf-cell';
      if(board[r][c]){cell.style.background=board[r][c];cell.classList.add('filled')}
      else if(preview.has(`${r},${c}`)){cell.style.background=pieces[selectedPiece].color;cell.classList.add('preview')}
      cell.addEventListener('click',()=>placeAt(r,c));
      cell.addEventListener('mouseover',()=>renderBoard(r,c));
      g.appendChild(cell);
    }
  }
}

function canPlace(shape,r,c){
  return shape.every((row2,dr)=>row2.every((cell,dc)=>!cell||(r+dr<ROWS&&c+dc<COLS_N&&!board[r+dr][c+dc])));
}

function placeAt(r,c){
  if(selectedPiece===null)return;
  const p=pieces[selectedPiece];
  if(!canPlace(p.shape,r,c)){document.getElementById('msg').textContent='❌ Cannot place here!';return;}
  p.shape.forEach((row2,dr)=>row2.forEach((cell,dc)=>{if(cell)board[r+dr][c+dc]=p.color}));
  p.placed=true;sfxPlace();
  score+=p.shape.flat().filter(Boolean).length*10;
  document.getElementById('s-score').textContent=score;
  clearLines();selectedPiece=null;
  if(pieces.every(p=>p.placed))spawnPieces();
  else renderPieces();
  renderBoard();
  if(!hasAnyMove())endGame();
}

function clearLines(){
  let cleared=0;
  // check rows
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(COLS_N).fill(null));cleared++;}
  }
  // check cols
  for(let c=COLS_N-1;c>=0;c--){
    if(board.every(row=>row[c])){board.forEach(row=>row[c]=null);cleared++;}
  }
  if(cleared>0){lines+=cleared;score+=cleared*cleared*50;sfxLine();document.getElementById('s-lines').textContent=lines;document.getElementById('s-score').textContent=score;}
}

function hasAnyMove(){
  return pieces.some(p=>!p.placed&&Array.from({length:ROWS},(_,r)=>Array.from({length:COLS_N},(_,c)=>canPlace(p.shape,r,c))).flat().some(Boolean));
}

function endGame(){
  sfxOver();
  const isNew=best===null||score>best;
  if(isNew)best=score;
  document.getElementById('s-best').textContent=best||'--';
  document.getElementById('ws-score').textContent=score;
  document.getElementById('ws-best').textContent=isNew?'🏆 New Best Score!':'';
  setTimeout(()=>document.getElementById('win-screen').classList.add('show'),500);
}

newGame();
</script>
</body>
</html>
