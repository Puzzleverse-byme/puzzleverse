<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#07070F">
<title>Math Storm – PuzzleVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070F;--surface:#10101E;--card:#16162A;--border:#2A2A4A;--purple:#7C3AED;--pg:#9D5BF5;--cyan:#00E5FF;--yellow:#FFD600;--green:#00E676;--pink:#FF4081;--text:#E8E8FF;--muted:#6868A0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(7,7,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1rem;color:var(--cyan);letter-spacing:2px;text-shadow:0 0 20px var(--cyan);text-decoration:none}
.nav-logo span{color:var(--pg)}
.nav-back{background:rgba(124,58,237,0.15);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 16px;font-size:0.82rem;cursor:pointer}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:100px 16px 60px}
.game-label{font-size:0.72rem;font-weight:700;color:var(--pg);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;text-align:center}
.game-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,6vw,2.4rem);font-weight:900;text-align:center;margin-bottom:6px}
.game-sub{color:var(--muted);font-size:0.88rem;text-align:center;margin-bottom:24px}
.diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.diff-btn{padding:7px 18px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer}
.diff-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.stats-bar{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;min-width:80px}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.timer-wrap{margin-bottom:20px}
.timer-bg{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:99px;transition:width 1s linear}
.timer-fill.urgent{background:linear-gradient(90deg,var(--pink),#ff1744)}
.question-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:20px;box-shadow:0 0 40px rgba(124,58,237,0.15);min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.question-text{font-family:'Orbitron',sans-serif;font-size:clamp(1.8rem,8vw,3rem);font-weight:900;color:var(--text);margin-bottom:8px}
.question-hint{font-size:0.8rem;color:var(--muted)}
.answer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.ans-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:18px;font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.ans-btn:active{transform:scale(0.96)}
.ans-btn.correct{background:rgba(0,230,118,0.15);border-color:var(--green);color:var(--green)}
.ans-btn.wrong{background:rgba(255,64,129,0.15);border-color:var(--pink);color:var(--pink)}
.start-wrap{text-align:center;padding:40px 0}
.btn-primary{background:linear-gradient(135deg,var(--purple),#5B21B6);color:#fff;border:none;border-radius:10px;padding:16px 36px;font-size:1.1rem;font-weight:600;cursor:pointer;margin:6px}
.btn-outline{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:10px;padding:13px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin:6px}
#feedback{text-align:center;font-size:1.1rem;font-weight:700;min-height:28px;margin-bottom:8px}
#win-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,7,15,0.93);backdrop-filter:blur(10px);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
#win-screen.show{display:flex}
.win-emoji{font-size:3.5rem;margin-bottom:14px;animation:bounce 0.6s ease infinite alternate}
@keyframes bounce{to{transform:translateY(-10px)}}
.win-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,5vw,2rem);font-weight:900;color:var(--yellow);text-shadow:0 0 28px var(--yellow);margin-bottom:8px}
.win-sub{color:var(--muted);margin-bottom:8px;font-size:0.95rem}
.win-score{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--cyan);margin:16px 0}
.win-stars{font-size:2rem;margin-bottom:20px}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2750548018774327" crossorigin="anonymous"></script>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Puzzle<span>Verse</span></a>
  <button class="nav-back" onclick="window.location.href='index.html'">← Back</button>
</nav>

<div class="wrap">
  <div class="game-label">Speed Game</div>
  <h1 class="game-title">🧮 Math Storm</h1>
  <p class="game-sub">Solve as many equations as possible before time runs out!</p>

  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff('easy',this)">😊 Easy</button>
    <button class="diff-btn" onclick="setDiff('medium',this)">🔥 Medium</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">💀 Hard</button>
  </div>

  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-val" id="s-score">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-time">60</div><div class="stat-lbl">Seconds</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Streak 🔥</div></div>
    <div class="stat-chip"><div class="stat-val" id="s-best">--</div><div class="stat-lbl">Best</div></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bg"><div class="timer-fill" id="timer-fill"></div></div>
  </div>

  <div id="feedback"></div>

  <div id="game-area">
    <div class="start-wrap">
      <p style="color:var(--muted);margin-bottom:20px;font-size:0.95rem">Pick a difficulty and start!</p>
      <button class="btn-primary" onclick="startGame()">▶ Start Game</button>
    </div>
  </div>
</div>

<div id="win-screen">
  <div class="win-emoji">⏰</div>
  <div class="win-title">Time's Up!</div>
  <p class="win-sub">Final Score</p>
  <div class="win-score" id="ws-score">0</div>
  <div class="win-stars" id="ws-stars">⭐</div>
  <p class="win-sub" id="ws-detail"></p>
  <div style="margin-top:20px">
    <button class="btn-primary" onclick="startGame()">🔄 Play Again</button>
    <button class="btn-outline" onclick="document.getElementById('win-screen').classList.remove('show')">📊 View</button>
  </div>
</div>

<script>
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTone(f,t,d,v=0.2,delay=0){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime+delay);g.gain.setValueAtTime(v,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+d);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+d)}catch(e){}}
function sfxCorrect(){playTone(523,'sine',0.08,0.25);playTone(659,'sine',0.08,0.25,0.08)}
function sfxWrong(){playTone(220,'sawtooth',0.1,0.2)}
function sfxUrgent(){playTone(880,'square',0.05,0.1)}
function sfxEnd(){[440,370,311,261].forEach((f,i)=>playTone(f,'sawtooth',0.15,0.2,i*0.12))}

const DIFFS={
  easy:{time:60,ops:['+','-'],max:10},
  medium:{time:60,ops:['+','-','×'],max:12},
  hard:{time:45,ops:['+','-','×','÷'],max:15}
};

let diff='easy',score=0,streak=0,timeLeft=60,totalTime=60,timerInt=null,gameOn=false,correct=0,wrong=0;
let bestScores={easy:null,medium:null,hard:null};
let currentAnswer=0,answerBtns=[];

function setDiff(d,btn){diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

function genQuestion(){
  const cfg=DIFFS[diff];
  const op=cfg.ops[Math.floor(Math.random()*cfg.ops.length)];
  let a,b,ans,text;
  if(op==='+'){a=Math.floor(Math.random()*cfg.max)+1;b=Math.floor(Math.random()*cfg.max)+1;ans=a+b;text=`${a} + ${b}`}
  else if(op==='-'){a=Math.floor(Math.random()*cfg.max)+1;b=Math.floor(Math.random()*a)+1;ans=a-b;text=`${a} - ${b}`}
  else if(op==='×'){a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;ans=a*b;text=`${a} × ${b}`}
  else{a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;ans=a;text=`${a*b} ÷ ${b}`}
  currentAnswer=ans;
  // generate 3 wrong answers
  const wrongs=new Set();
  while(wrongs.size<3){const w=ans+Math.floor(Math.random()*10)-5;if(w!==ans&&w>=0)wrongs.add(w)}
  const opts=[ans,...wrongs].sort(()=>Math.random()-0.5);
  document.getElementById('game-area').innerHTML=`
    <div class="question-box">
      <div class="question-text">${text} = ?</div>
      <div class="question-hint">Tap the correct answer</div>
    </div>
    <div class="answer-grid" id="ans-grid">
      ${opts.map(o=>`<button class="ans-btn" onclick="checkAnswer(${o},this)">${o}</button>`).join('')}
    </div>`;
}

function checkAnswer(val,btn){
  if(!gameOn)return;
  const btns=document.querySelectorAll('.ans-btn');
  btns.forEach(b=>b.onclick=null);
  if(val===currentAnswer){
    btn.classList.add('correct');
    score+=10+(streak*2);streak++;correct++;
    sfxCorrect();
    document.getElementById('feedback').innerHTML=`<span style="color:var(--green)">✅ +${10+(streak-1)*2} pts!</span>`;
  } else {
    btn.classList.add('wrong');
    btns.forEach(b=>{if(parseInt(b.textContent)===currentAnswer)b.classList.add('correct')});
    streak=0;wrong++;sfxWrong();
    document.getElementById('feedback').innerHTML=`<span style="color:var(--pink)">❌ Wrong!</span>`;
  }
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-streak').textContent=streak;
  setTimeout(()=>{document.getElementById('feedback').textContent='';genQuestion()},700);
}

function startGame(){
  clearInterval(timerInt);
  const cfg=DIFFS[diff];
  timeLeft=cfg.time;totalTime=cfg.time;
  score=0;streak=0;correct=0;wrong=0;gameOn=true;
  document.getElementById('s-score').textContent=0;
  document.getElementById('s-streak').textContent=0;
  document.getElementById('s-time').textContent=timeLeft;
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('feedback').textContent='';
  updateTimerBar();genQuestion();
  timerInt=setInterval(()=>{
    timeLeft--;
    document.getElementById('s-time').textContent=timeLeft;
    updateTimerBar();
    if(timeLeft<=10&&timeLeft%2===0)sfxUrgent();
    if(timeLeft<=0){clearInterval(timerInt);gameOn=false;endGame();}
  },1000);
}

function updateTimerBar(){
  const pct=(timeLeft/totalTime)*100;
  const f=document.getElementById('timer-fill');
  f.style.width=pct+'%';
  f.classList.toggle('urgent',pct<25);
}

function endGame(){
  sfxEnd();
  const isNew=bestScores[diff]===null||score>bestScores[diff];
  if(isNew)bestScores[diff]=score;
  document.getElementById('s-best').textContent=bestScores[diff]||'--';
  document.getElementById('ws-score').textContent=score;
  document.getElementById('ws-detail').textContent=`✅ ${correct} correct  ❌ ${wrong} wrong`;
  const stars=score>=200?'⭐⭐⭐':score>=100?'⭐⭐':'⭐';
  document.getElementById('ws-stars').textContent=stars+(isNew?' 🏆 New Best!':'');
  document.getElementById('win-screen').classList.add('show');
  document.getElementById('game-area').innerHTML=`<div class="start-wrap"><button class="btn-primary" onclick="startGame()">🔄 Play Again</button></div>`;
}
</script>
</body>
</html>
